<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タロット2枚引き</title>
  <script>
    (function(){
      var KEY   = 'hinoe2024';
      var STORE = 'tarot_access_v1';
      var p = new URLSearchParams(location.search);
      if (p.get('key') === KEY) {
        localStorage.setItem(STORE, '1');
        history.replaceState({}, '', location.pathname);
      }
      if (localStorage.getItem(STORE) !== '1') {
        document.documentElement.classList.add('locked');
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #fdf3e7;
      background-image:
        radial-gradient(ellipse at 30% 30%, rgba(255, 200, 120, 0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 70%, rgba(255, 160, 80, 0.25) 0%, transparent 55%);
      font-family: 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif;
      color: #5a3a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.7rem;
      letter-spacing: 0.4em;
      color: #c0621a;
      text-shadow: 0 0 24px rgba(220, 140, 60, 0.35);
      white-space: nowrap;
    }

    .subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      color: #b08060;
      margin-top: -1rem;
    }

    /* ── カードエリア ── */
    .cards-area {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
    }

    .card-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .card-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: #b08060;
    }

    .card-container {
      width: 140px;
      height: 220px;
      perspective: 900px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    .card-back,
    .card-front {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
    }

    /* 裏面 */
    .card-back {
      background: linear-gradient(140deg, #f5dfc0 0%, #f0c898 50%, #f5dfc0 100%);
      border: 1px solid rgba(192, 98, 26, 0.3);
    }
    .card-back::before {
      content: '✦';
      font-size: 3.2rem;
      color: rgba(192, 98, 26, 0.25);
    }
    .card-back::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(192, 98, 26, 0.15);
      border-radius: 7px;
    }

    /* 表面（共通） */
    .card-front { transform: rotateY(180deg); }

    /* ── 大アルカナ ── */
    .arcana-front {
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(180, 150, 210, 0.35);
      background-color: #0d0d1a;
    }

    .arcana-front.reversed {
      border-color: rgba(210, 120, 120, 0.45);
    }

    .arcana-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .arcana-front.reversed .arcana-img {
      transform: rotate(180deg);
    }

    /* カード内コンテンツ（画像下部オーバーレイ） */
    .arcana-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.4rem 0.4rem 0.5rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.82));
      border-radius: 0 0 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }

    .arcana-front.reversed .arcana-content {
      bottom: auto;
      top: 0;
      border-radius: 12px 12px 0 0;
      background: linear-gradient(rgba(0,0,0,0.82), transparent);
      transform: rotate(180deg);
    }

    .arcana-numeral {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.6);
    }

    .arcana-name {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    .position-badge {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: rgba(180, 150, 210, 0.25);
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(180, 150, 210, 0.3);
    }

    .arcana-front.reversed .position-badge {
      background: rgba(210, 120, 120, 0.25);
      border-color: rgba(210, 120, 120, 0.4);
    }

    /* ── 五行カード 裏面（太陽マーク） ── */
    .element-card-back {
      background: #fdf0dc url('images/キャラ1.png') center/80% no-repeat;
      border: 3px solid #c0621a;
      box-shadow: 0 0 0 1px rgba(192, 98, 26, 0.2), inset 0 0 0 2px rgba(255, 220, 160, 0.6);
    }
    .element-card-back::before { content: none; }
    .element-card-back::after  { content: none; }

    /* ── 五行カード 表面（イラスト全面） ── */
    .element-front {
      padding: 0;
      overflow: hidden;
      border: 3px solid #c0621a;
      box-shadow: 0 0 0 1px rgba(192, 98, 26, 0.2), inset 0 0 0 2px rgba(255, 220, 160, 0.6);
      background-size: 85%;
      background-position: center 40%;
      background-repeat: no-repeat;
      background-color: #fdf0dc;
    }

    /* テキストオーバーレイ（下部） */
    .element-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 0.4rem 0.6rem;
      background: linear-gradient(transparent, rgba(180, 100, 20, 0.55));
      border-radius: 0 0 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }

    .element-kanji {
      font-size: 1.6rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 1px 4px rgba(120, 60, 0, 0.7);
      line-height: 1;
    }

    .element-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(120, 60, 0, 0.7);
    }

    /* ── 区切り ── */
    .cross {
      font-size: 1.4rem;
      color: #c8956a;
      align-self: center;
      margin-top: 2rem;
    }

    /* ── メッセージ ── */
    .message-area {
      max-width: 360px;
      width: 100%;
      padding: 1.1rem 1.8rem;
      background: rgba(255, 200, 120, 0.2);
      border: 1px solid rgba(200, 130, 60, 0.3);
      border-radius: 8px;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message-area.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .message-text {
      font-size: 1rem;
      letter-spacing: 0.18em;
      line-height: 1.9;
      color: #5a3a1a;
    }

    /* ── ひのえの一言アドバイス ── */
    .advice-area {
      max-width: 360px;
      width: 100%;
      padding: 1rem 1.8rem 1rem 1.4rem;
      background: rgba(192, 98, 26, 0.07);
      border: 1px solid rgba(192, 98, 26, 0.2);
      border-radius: 8px;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      overflow: visible;
    }
    .advice-area.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .advice-label {
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.35em;
      color: #a04a10;
    }
    .advice-text {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      line-height: 1.9;
      color: #5a3a1a;
    }
    .advice-sun {
      position: absolute;
      bottom: -18px;
      right: 8px;
      width: 48px;
      height: 48px;
      object-fit: contain;
      animation: sun-float 2.2s ease-in-out infinite;
    }
    @keyframes sun-float {
      0%,100% { transform: translateY(0)    rotate(-5deg); }
      50%      { transform: translateY(-9px) rotate( 5deg); }
    }
    @media (max-width: 359px) {
      .advice-area { padding: 0.8rem 1rem 0.8rem 0.8rem; }
      .advice-text { font-size: 0.85rem; }
      .advice-sun  { width: 38px; height: 38px; bottom: -14px; right: 6px; }
    }
    @media (min-width: 768px) {
      .advice-area { max-width: 480px; padding: 1.2rem 2.2rem 1.2rem 1.8rem; }
      .advice-text { font-size: 1.05rem; }
      .advice-sun  { width: 54px; height: 54px; bottom: -22px; right: 12px; }
    }

    /* ── LINE CTA ── */
    .line-cta-block {
      max-width: 340px;
      width: 100%;
      background: rgba(255,248,235,0.85);
      border: 1px solid rgba(192,98,26,0.25);
      border-radius: 10px;
      padding: 1.2rem 1.4rem 1rem;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .line-cta-block.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .line-cta-desc {
      font-size: 0.8rem;
      line-height: 1.9;
      color: #b08060;
      letter-spacing: 0.06em;
      margin-bottom: 0.7rem;
    }
    .line-cta-link {
      display: inline-block;
      color: #c0621a;
      font-size: 0.88rem;
      font-weight: bold;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .line-cta-link:hover { color: #8a3a10; }

    /* ── ボタン ── */
    .draw-button {
      padding: 0.85rem 3rem;
      background: transparent;
      border: 1px solid rgba(192, 98, 26, 0.5);
      color: #c0621a;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.3em;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    .draw-button:hover:not(:disabled) {
      background: rgba(220, 140, 60, 0.12);
      border-color: #c0621a;
      box-shadow: 0 0 18px rgba(220, 140, 60, 0.25);
    }

    .draw-button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── レスポンシブ対応 ── */

    /* モバイル小（〜359px） */
    @media (max-width: 359px) {
      body { padding: 1.2rem 0.6rem; gap: 1rem; }
      h1 { font-size: 1.1rem; letter-spacing: 0.2em; }
      .subtitle { font-size: 0.7rem; }
      .cards-area { gap: 0.8rem; }
      .card-container { width: 100px; height: 160px; }
      .card-back::before { font-size: 2.4rem; }
      .arcana-name { font-size: 0.85rem; }
      .element-kanji { font-size: 1.3rem; }
      .element-subtitle { font-size: 0.6rem; }
      .message-area { padding: 0.9rem 1rem; }
      .message-text { font-size: 0.85rem; letter-spacing: 0.1em; }
      .draw-button { padding: 0.75rem 2rem; font-size: 0.85rem; }
    }

    /* モバイル標準（360px〜479px） */
    @media (min-width: 360px) and (max-width: 479px) {
      body { padding: 1.5rem 0.8rem; gap: 1.2rem; }
      h1 { font-size: 1.4rem; letter-spacing: 0.3em; }
      .cards-area { gap: 1rem; }
      .card-container { width: 120px; height: 190px; }
      .card-back::before { font-size: 2.8rem; }
      .element-kanji { font-size: 1.4rem; }
      .message-area { max-width: 320px; padding: 1rem 1.2rem; }
      .message-text { font-size: 0.9rem; }
      .draw-button { padding: 0.8rem 2.5rem; }
    }

    /* タブレット（768px〜） */
    @media (min-width: 768px) {
      body { padding: 2.5rem 2rem; gap: 1.8rem; }
      h1 { font-size: 2rem; }
      .cards-area { gap: 2rem; }
      .card-container { width: 160px; height: 250px; }
      .card-back::before { font-size: 3.8rem; }
      .arcana-name { font-size: 1.1rem; }
      .element-kanji { font-size: 1.8rem; }
      .message-area { max-width: 480px; padding: 1.4rem 2.2rem; }
      .message-text { font-size: 1.1rem; }
      .draw-button { padding: 1rem 4rem; font-size: 1rem; }
    }

    /* デスクトップ（1024px〜） */
    @media (min-width: 1024px) {
      body { padding: 0.7rem 2rem; gap: 0.65rem; justify-content: flex-start; min-height: 100vh; }
      h1 { font-size: 1.9rem; }
      .subtitle { margin-top: -0.5rem; }
      .cards-area { gap: 2rem; }
      .card-container { width: 140px; height: 210px; }
      .arcana-name { font-size: 0.95rem; }
      .element-kanji { font-size: 1.5rem; }
      .message-area { max-width: 620px; padding: 0.65rem 1.8rem; min-height: 0; }
      .message-text { font-size: 0.95rem; line-height: 1.75; }
      .advice-area { max-width: 620px; padding: 0.65rem 1.8rem 0.65rem 1.4rem; }
      .advice-label { font-size: 0.67rem; }
      .advice-text { font-size: 0.9rem; line-height: 1.65; }
      .advice-sun { width: 46px; height: 46px; bottom: -16px; }
      .line-cta-block { max-width: 400px; padding: 0.65rem 1.2rem 0.55rem; }
      .line-cta-desc { font-size: 0.78rem; line-height: 1.6; margin-bottom: 0.3rem; }
      .draw-button { padding: 0.65rem 2.5rem; font-size: 0.92rem; }
    }

    /* ── シャッフルアニメーション ── */
    .shuffle-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      background: rgba(253, 243, 231, 0.93);
      gap: 1.5rem;
    }
    .shuffle-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .shuffle-ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      overflow: visible;
    }
    .shuffle-ring {
      position: absolute;
      inset: 0;
      overflow: visible;
    }
    /* 円を描くように移動 ＋ 傾きで「手でかき混ぜる」感を演出 */
    @keyframes mix-circle {
      0%   { transform: translate(  0px, -45px) rotate(  0deg); }
      25%  { transform: translate( 45px,   0px) rotate( 20deg); }
      50%  { transform: translate(  0px,  45px) rotate(  0deg); }
      75%  { transform: translate(-45px,   0px) rotate(-20deg); }
      100% { transform: translate(  0px, -45px) rotate(  0deg); }
    }
    @keyframes card-drift {
      0%   { transform: translate(0px, 0px) rotate(var(--r, 0deg)); }
      100% { transform: translate(var(--dx, 0px), var(--dy, 0px))
                        rotate(calc(var(--r, 0deg) + var(--spin, 12deg))); }
    }
    .shuffle-ring.mixing {
      animation: mix-circle 1s linear infinite;
    }
    .shuffle-mini {
      position: absolute;
      width: 44px;
      height: 68px;
      border-radius: 7px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
      animation: card-drift 0.85s ease-in-out infinite alternate;
    }
    .shuffle-mini.arcana-mini {
      background: linear-gradient(140deg, #f5dfc0 0%, #f0c898 50%, #f5dfc0 100%);
      border: 1px solid rgba(192, 98, 26, 0.3);
    }
    .shuffle-mini.arcana-mini::before {
      content: '✦';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: rgba(192, 98, 26, 0.28);
    }
    .shuffle-mini.element-mini {
      background: #fdf0dc url('images/キャラ1.png') center/75% no-repeat;
      border: 2px solid #c0621a;
      box-shadow: 0 0 0 1px rgba(192, 98, 26, 0.15), 0 2px 10px rgba(0,0,0,0.13);
    }
    .shuffle-label {
      font-size: 0.82rem;
      letter-spacing: 0.45em;
      color: #b08060;
      animation: shuffle-pulse 0.9s ease-in-out infinite alternate;
    }
    @keyframes shuffle-pulse {
      from { opacity: 0.35; }
      to   { opacity: 1; }
    }
    /* ── アクセス制限 ── */
    html.locked body > :not(#lock-screen) { display: none !important; }

    #lock-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #fdf3e7;
      background-image:
        radial-gradient(ellipse at 30% 30%, rgba(255,200,120,0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 70%, rgba(255,160,80,0.25) 0%, transparent 55%);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 1.5rem;
      font-family: 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif;
    }
    html.locked #lock-screen { display: flex; }

    .lock-box {
      text-align: center;
      padding: 2.5rem 2rem 2rem;
      background: rgba(255,248,235,0.95);
      border: 1px solid rgba(192,98,26,0.3);
      border-radius: 16px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(192,98,26,0.1);
    }
    .lock-icon {
      font-size: 2.2rem;
      color: rgba(192,98,26,0.4);
      margin-bottom: 1rem;
    }
    .lock-title {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: #c0621a;
      margin-bottom: 1.2rem;
      font-weight: normal;
    }
    .lock-desc {
      font-size: 0.9rem;
      line-height: 1.9;
      color: #5a3a1a;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }
    .lock-sub {
      font-size: 0.8rem;
      color: #b08060;
      letter-spacing: 0.1em;
      margin-bottom: 1.6rem;
      line-height: 1.7;
    }
    .lock-button {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: #c0621a;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      transition: background 0.25s, box-shadow 0.25s;
      margin-bottom: 1rem;
    }
    .lock-button:hover { background: #a04a10; box-shadow: 0 4px 16px rgba(192,98,26,0.3); }
    .lock-note {
      font-size: 0.72rem;
      color: #b08060;
      letter-spacing: 0.1em;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <!-- ロック画面 -->
  <div id="lock-screen">
    <div class="lock-box">
      <div class="lock-icon">✦</div>
      <h2 class="lock-title">電子書籍ご購入者様専用</h2>
      <p class="lock-desc">このタロット占いアプリは、<br>電子書籍をご購入いただいた方限定です。</p>
      <p class="lock-sub">書籍の巻末に記載のフォームにご登録いただくと、<br>アクセス用URLが表示されます。</p>
      <a href="https://forms.gle/obfPPHrt8Y31aiho9" class="lock-button" target="_blank">フォームに回答する →</a>
      <p class="lock-note">登録完了後に表示されるURLをお気に入りに保存すると、<br>以降はいつでもご利用いただけます。</p>
    </div>
  </div>

  <h1>✦ タロット占い ✦</h1>
  <p class="subtitle">大アルカナ × 五行カード</p>

  <div class="cards-area">
    <div class="card-slot">
      <div class="card-label">大アルカナ</div>
      <div class="card-container">
        <div class="card-inner" id="arcana-card">
          <div class="card-back"></div>
          <div class="card-front arcana-front" id="arcana-front">
            <img class="arcana-img" id="arcana-img" src="" alt="">
            <div class="arcana-content">
              <div class="arcana-numeral" id="arcana-numeral"></div>
              <div class="arcana-name" id="arcana-name"></div>
              <div class="position-badge" id="position-badge"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="cross">×</div>

    <div class="card-slot">
      <div class="card-label">五行カード</div>
      <div class="card-container">
        <div class="card-inner" id="element-card">
          <div class="card-back element-card-back"></div>
          <div class="card-front element-front" id="element-front">
            <div class="element-overlay">
              <div class="element-kanji" id="element-kanji"></div>
              <div class="element-subtitle" id="element-subtitle"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- シャッフルオーバーレイ -->

function initShuffleRing() {
  const ring = document.getElementById('shuffle-ring');
  ring.innerHTML = '';
  ring.classList.remove('mixing');
  void ring.offsetWidth; // アニメーションリセット用

  const cx = 120, cy = 120; // 240x240の中心
  const cardW = 44, cardH = 68;

  // カードはやや密集させて配置（円軌道の動きで自然に広がる）
  const layout = [
    { ox:   0, oy:  -8, r: -18, dx: -18, dy:  12, spin:  22 },
    { ox:  28, oy: -28, r:  24, dx:  14, dy: -10, spin: -20 },
    { ox: -32, oy: -22, r: -28, dx: -14, dy:  14, spin:  26 },
    { ox:  30, oy:  22, r:  20, dx:  18, dy:  10, spin: -18 },
    { ox: -28, oy:  26, r: -22, dx: -12, dy: -12, spin:  24 },
    { ox:  10, oy:  32, r:  30, dx:  10, dy:  18, spin: -24 },
    { ox: -14, oy:   6, r: -12, dx: -20, dy:   8, spin:  18 },
    { ox:  16, oy: -12, r:  14, dx:  12, dy: -16, spin: -26 },
  ];

  layout.forEach((p, i) => {
    const x = cx + p.ox - cardW / 2;
    const y = cy + p.oy - cardH / 2;

    const card = document.createElement('div');
    card.className = `shuffle-mini ${i % 2 === 0 ? 'arcana-mini' : 'element-mini'}`;
    card.style.left = `${x}px`;
    card.style.top  = `${y}px`;
    card.style.setProperty('--r',    `${p.r}deg`);
    card.style.setProperty('--dx',   `${p.dx}px`);
    card.style.setProperty('--dy',   `${p.dy}px`);
    card.style.setProperty('--spin', `${p.spin}deg`);
    card.style.animationDelay = `${i * 0.08}s`;
    ring.appendChild(card);
  });
}

  const btn = document.getElementById('draw-button');
  btn.disabled = true;

  const arcanaCard  = document.getElementById('arcana-card');
  const arcanaFront = document.getElementById('arcana-front');
  const elementCard = document.getElementById('element-card');
  const messageArea = document.getElementById('message-area');

  // リセット
  const adviceArea  = document.getElementById('advice-area');
  arcanaCard.classList.remove('flipped');
  elementCard.classList.remove('flipped');
  arcanaFront.classList.remove('reversed');
  messageArea.classList.remove('visible');
  adviceArea.classList.remove('visible');
  document.getElementById('line-cta').classList.remove('visible');

  // 抽選
  const ai       = Math.floor(Math.random() * 22);
  const ei       = Math.floor(Math.random() * 5);
  const reversed = Math.random() < 0.5;
  const ri       = reversed ? 1 : 0;

  const a = ARCANA[ai];
  const e = ELEMENTS[ei];

  // 大アルカナ面
  document.getElementById('arcana-img').src             = `images/arcana/${ai}.jpg`;
  document.getElementById('arcana-numeral').textContent = a.num;
  document.getElementById('arcana-name').textContent    = a.name;
  document.getElementById('position-badge').textContent = reversed ? '逆位置' : '正位置';

  // 五行カード面
  const ef = document.getElementById('element-front');
  ef.className = 'card-front element-front';
  ef.style.backgroundImage = `url('images/五行イラスト/${e.key}.png')`;
  document.getElementById('element-kanji').textContent    = e.key;
  document.getElementById('element-subtitle').textContent = e.sub;

  // メッセージ
  document.getElementById('message-text').textContent = MESSAGES[ai][ri][ei];
  document.getElementById('advice-text').textContent  = ADVICE[ei][ri];

  // シャッフルアニメーション開始
  initShuffleRing();
  const overlay = document.getElementById('shuffle-overlay');
  const ring    = document.getElementById('shuffle-ring');
  overlay.classList.add('active');
  setTimeout(() => ring.classList.add('mixing'), 50);

  // シャッフル終了 → オーバーレイフェードアウト
  setTimeout(() => overlay.classList.remove('active'), 2650);

  // カードをめくる
  setTimeout(() => {
    arcanaCard.classList.add('flipped');
    if (reversed) arcanaFront.classList.add('reversed');
  }, 3100);

  setTimeout(() => elementCard.classList.add('flipped'), 3650);

  setTimeout(() => {
    messageArea.classList.add('visible');
    setTimeout(() => adviceArea.classList.add('visible'), 600);
    setTimeout(() => document.getElementById('line-cta').classList.add('visible'), 1200);
    btn.disabled = false;
    btn.textContent = 'もう一度引く';
    drawing = false;
  }, 4500);
}
</script>
</body>
</html>
